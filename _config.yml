title: "Cameron Heather"
# subtitle: "PhD Student, University of Warwick"
description: ""
url: "camheather.githib.io"
baseurl: ""

minimal_mistakes_skin: dirt
# search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
# permalink: /:categories/:title/
# paginate: 5 # amount of posts to show
# paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones


plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache


# Author info (used in sidebar)
author:
  name: "Cameron Heather"
  avatar: "/assets/images/me_waterfall2.jpg" # optional
  bio: "<i class='fas fa-building-columns'></i> University of Warwick"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:cameron.heather@warwick.ac.uk"
    - label: "Department Profile"
      icon: "fa-solid fa-id-card"
      url: "https://warwick.ac.uk/fac/sci/maths/people/staff/heather/"
    # - label: "Google Scholar"
    #   icon: "ai ai-google-scholar"
    #   url: "https://scholar.google.com/..."
    # - label: "ORCID"
    #   icon: "ai ai-orcid"
    #   url: "https://orcid.org/...."
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/cameron-heather-8403113aa/"
    # - label: "GitHub"
    #   icon: "fab fa-github"
    #   url: "https://github.com/camheather"

# Layout defaults
defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true

# Tell Jekyll to load your custom CSS
custom_css:
  - /assets/css/style.scss


# Markdown
markdown: kramdown
highlighter: rouge

# Navigation
include:
  - _pages

atom_feed:
  hide: true
footer:
  links: []
